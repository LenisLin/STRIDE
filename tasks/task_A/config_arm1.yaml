# Canonical shared Task-A operator surface:
# - supported enabled_arms: A1_baseline, A1_broken_reference, A2_cross_compartment, A3_uq_stress
# - mixed count/density runs should declare data.mass_mode_by_arm explicitly
# - legacy data.mass_mode remains a single-mode fallback for older one-surface runs
task_name: "Task A: aligned operator surface"

enabled_arms:
  - "A1_baseline"
  - "A1_broken_reference"

data:
  mass_mode_by_arm:
    A1_baseline: "density"
    A1_broken_reference: "density"
    A2_cross_compartment: "density"
    A3_uq_stress: "density"
  # Legacy single-mode fallback. Kept for older configs where every enabled arm
  # shares the same locked mass semantics.
  mass_mode: "density"
  k_full: 25

uot_params:
  eps_schedule: [1.0, 0.5, 0.1]
  max_iter: 4000
  tol: 1.0e-8
  eta_floor: 1.0e-12
  n_min_proto: 0.0
  tau_mode: "external_fixed_by_task"

arm1:
  n_draws: 200
  random_seed: 42
  fixed_lambda_by_compartment:
    TC: 1.0
    IM: 1.0
    PT: 1.0
  fixed_tau_by_compartment:
    TC: 1.0
    IM: 1.0
    PT: 1.0
