# Task A config surface for the rewritten layout:
# - prepare and block-local workflows consume the Stage 0 and ordered-proxy settings below
# - enabled_blocks is the block-local selection surface
# - block-local outputs are written under the selected block run root
task_name: "Task A: Stage 0 mapping and block-local bundles"

enabled_blocks:
  - "block0_locality_gate"
  - "block1_real_data_discovery"

ordered_proxy:
  domains: ["TC", "IM", "PT"]
  pair_families:
    - name: "TC-IM"
      source_domain: "TC"
      target_domain: "IM"
      claim_role: "confirmatory"
      pair_types: ["TC->IM", "IM->TC"]
    - name: "TC-PT"
      source_domain: "TC"
      target_domain: "PT"
      claim_role: "confirmatory"
      pair_types: ["TC->PT", "PT->TC"]
    - name: "IM-PT"
      source_domain: "IM"
      target_domain: "PT"
      claim_role: "audit_only"
      pair_types: ["IM->PT", "PT->IM"]

stage0:
  stage0_h5ad: null
  build_missing_basis: false
  default_basis_neighbors: 20
  default_geometry_neighbors: 5

exports:
  mapping_manifest_filename: "task_a_stride_mapping.json"
  prepare_manifest_filename: "task_a_prepare_manifest.json"
  core_fit_dry_run_filename: "task_a_core_fit_dry_run.csv"

benchmarks:
  default_n_patients: 6
  default_seed: 0

data:
  mass_mode: "uniform"
  k_full: 10

block0:
  # Block 0 reuses the stable STRIDE fit path on the task-local `TC-IM` family
  # and builds a seeded within-patient exact-count TC/IM FOV/ROI domain-label
  # permutation null. Identity permutations are allowed; cross-patient
  # borrowing and relaxed fallback are disallowed.
  random_seed: 7

block1:
  target_alpha: 0.05
  lambda_grid: [0.05, 0.1, 0.5, 1.0, 2.0, 5.0, 10.0]

block3:
  # Block 3 is Stage0 + config driven. The benchmark family is an explicit
  # single-field contract; current validation accepts only TC-IM.
  benchmark_pair_family: "TC-IM"
  master_seed: 17
  # Round 2 freezes the v2 Block 3 architecture registry-first.
  # Retired assessment-policy thresholds are no longer part of the active
  # Block 3 config surface.
  enabled_subexperiments: ["3A", "3B", "3C"]
